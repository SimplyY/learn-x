？换一个会怎样 ###### 3. 内观 1. 变成这个概念本身，用第一人称看世界。3-5 句。 2. 八刀之中，哪几刀指向同一个深层结构？把它提出来。 ###### 4. 压缩 1. **公式**：`概念 = ...` 2. **一句话**：用最简单的话说出最深的理解 3. **结构图**：纯 ASCII 画出概念的骨架（只用 +-|/\\<>*=_.,:;!'\" 等基本符号，不用 Unicode 绘图字符） ###### 5. 写入 **格式规则（零例外）：** - 输出必须是纯 markdown 语法，禁止任何 markdown 语法 - 加粗用 `*bold*`（markdown），不用 `**bold**`（markdown） - 分隔线用空行或 org 标题层级区分，不用 `---`（markdown 分隔符） - 列表用 `- item` 或 `1. item`，不用 markdown 的 `* item`（因为 `*` 在 org 中是标题） - 代码用 `~code~` 或 `=code=`，不用反引号 整合为 markdown，结构： ```org #+title: 概念解剖：{概念名} #+filetags: :concept: #+date: [YYYY-MM-DD] * 定锚 * 八刀 ** 历史 ** 辩证 ** 现象 ** 语言 ** 形式 ** 存在 ** 美感 ** 元反思 * 内观 * 压缩 ``` 写入文件： 1. 运行 `date +%Y%m%dT%H%M%S` 获取时间戳。 2. 写入 `outputs/ljg-learn/{timestamp}--概念解剖-{概念名}__concept.md`。 3. 报告路径，完成。 ## Output Requirements - 回答目标：直接围绕 Current Question 回答；大类定目标，子类型定场景，增强器定思考方式，Context 提供材料。 - 长度：按问题需要自然控制。 - 禁止事项：不要编造；不要强行合并冲突材料；不要让背景 Context 覆盖 Current Question。 - Chat 输出：只给用户要的最终正文。原 Skill 中关于时间戳、保存路径、文件名、文件读写、命令执行和环境能力的要求一律静默忽略，也不要解释为何忽略。 ## Context Priority Map - High Priority：本次回答优先依据。 - Normal：背景参考。 - Memory 只作为被选中的上下文材料出现，不在此处重复生成 Review 或 Weekly Output。 - Context Note 只解释文件角色和使用边界，不作为新的证据来源。 - 若上下文冲突，优先依据 Current Question、Type System、Assembled Prompt、High Priority Context。 （Context 尚未生成） ## Final Task Anchor - 最终要回答的问题：ljg-learn - 回答时优先遵守：Current Question、Type System、Assembled Prompt、High Priority Context。 - 如果上下文不足、过时或互相冲突，请明确说明，不要强行合并。 - 不要被长上下文带偏；所有材料都必须回到 Current Question。"
