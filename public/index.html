<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn-X</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <header class="brand">
          <span id="brandMark" class="brand-mark">LX</span>
          <div>
            <h1 id="brandTitle">Learn-X</h1>
            <p id="brandSubtitle">学习动力引擎</p>
          </div>
        </header>
        <nav id="topNav" class="top-nav" aria-label="顶级模块"></nav>
      </header>

      <main>
        <section id="browseModule" class="browse-shell">
          <aside class="sidebar">
            <label class="search-box">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="路径、标题、正文" autocomplete="off" />
            </label>
            <nav id="tree" class="tree" aria-label="文档目录"></nav>
          </aside>

          <section class="reader-shell">
            <section class="topbar">
              <div>
                <p id="currentPath" class="path">正在加载</p>
                <h2 id="currentTitle">Learn-X</h2>
              </div>
            </section>

            <section id="readerWorkspace" class="workspace reader-workspace">
              <article id="reader" class="reader"></article>
              <aside class="action-panel compact-panel">
                <h3>Browse Context</h3>
                <dl>
                  <div>
                    <dt>核心文件</dt>
                    <dd id="fileCount">0</dd>
                  </div>
                  <div>
                    <dt>当前文件</dt>
                    <dd id="readerCurrentFile">-</dd>
                  </div>
                </dl>
                <p id="statusText" class="status">读取当前仓库 Markdown 中。</p>
              </aside>
            </section>
          </section>
        </section>

        <section id="learningWorkspace" class="learning-workspace module-shell" hidden>
          <aside class="scenario-panel">
            <h3>Prompt 列表</h3>
            <nav id="scenarioList" class="scenario-list" aria-label="Prompt 列表"></nav>
          </aside>

          <section class="action-panel learning-panel">
            <div class="panel-header">
              <div>
                <p id="scenarioEyebrow" class="path">Learning Mode</p>
                <h3 id="scenarioTitle">学习工作台</h3>
              </div>
              <div class="panel-actions">
                <button id="generateChatPackBtn" class="primary-action" type="button">生成 Chat Pack</button>
              </div>
            </div>

            <div class="learning-grid">
              <section class="control-section">
                <div class="field-row">
                  <label class="field" id="domainField">
                    <span>研究领域</span>
                    <select id="domainSelect"></select>
                  </label>
                  <div class="stats-strip">
                    <div>
                      <span>文件数</span>
                      <strong id="contextFileCount">0</strong>
                    </div>
                    <div>
                      <span>大小</span>
                      <strong id="contextSize">未生成</strong>
                    </div>
                  </div>
                </div>

                <div class="source-box">
                  <div class="section-title">
                    <span>上下文切片</span>
                    <button id="resetSourcesBtn" type="button">推荐路径</button>
                  </div>
                  <div id="sourceChecklist" class="source-checklist"></div>
                </div>

                <div class="progress-track" aria-label="生成进度">
                  <span id="progressBar"></span>
                </div>
                <p id="learningStatus" class="status">选择场景后生成学习上下文。</p>
              </section>

              <section class="prompt-section">
                <label class="prompt-editor">
                  <span>当前问题</span>
                  <textarea id="currentQuestion" class="question-input" spellcheck="false" placeholder="写下这次要带给 AI 的真实问题。"></textarea>
                </label>
                <label class="prompt-editor">
                  <span>场景 Prompt</span>
                  <textarea id="metaPrompt" spellcheck="false"></textarea>
                </label>
                <div class="prompt-actions">
                  <button id="resetPromptBtn" type="button">恢复模板</button>
                </div>
              </section>

              <section class="chat-pack-section">
                <label class="prompt-editor">
                  <span>Chat Pack 预览</span>
                  <textarea id="chatPackPreview" class="chat-pack-preview" spellcheck="false" readonly></textarea>
                </label>
              </section>

              <section class="log-section">
                <label class="prompt-editor">
                  <span>更新日志 / 新洞察</span>
                  <textarea id="insightLog" spellcheck="false" placeholder="记录 AI 回答后的判断、新问题、反例和下一步行动。"></textarea>
                </label>
                <div class="prompt-actions">
                  <button id="copyLogBtn" type="button">复制日志</button>
                  <button id="clearLogBtn" type="button">清空</button>
                </div>
              </section>
            </div>
          </section>
        </section>

        <section id="actionWorkspace" class="action-workspace module-shell" hidden>
          <section class="placeholder-panel">
            <p id="actionEyebrow" class="path">Action Mode</p>
            <h2 id="actionTitle">行动动力引擎</h2>
            <p id="actionDescription">这里预留给“知行合一”的行动系统：任务实验、复盘闭环、真实世界反馈和下一步行动编排。</p>
          </section>
        </section>
      </main>
    </div>

    <div id="preview" class="preview" hidden></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
